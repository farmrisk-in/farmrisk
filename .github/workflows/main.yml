name: Notify Fork

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Check PAT
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "PAT is EMPTY"
            exit 1
          else
            echo "PAT is AVAILABLE"
          fi

      - name: Dispatch event
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PAT }}
          repository: PrakharSinghOnGit/farmrisk
          event-type: upstream-updated
