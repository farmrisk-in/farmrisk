name: Notify Fork

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT }}
          repository: PrakharSinghOnGit/farmrisk
          event-type: upstream-updated
